<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Не удалось списать оплату</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;700;900&display=swap');
  body { margin: 0; padding: 0; background-color: #F6F6F6; font-family: 'Golos Text', Arial, sans-serif; }
  .email-wrapper { background-color: #F6F6F6; padding: 32px 16px; }
  .email-container { max-width: 600px; margin: 0 auto; background-color: #FFFFFF; border-radius: 12px; overflow: hidden; }
  .email-header { padding: 28px 40px 20px; border-bottom: 1px solid #F0F0F0; }
  .email-logo { font-family: 'Golos Text', Arial, sans-serif; font-weight: 900; font-size: 20px; color: #111111; text-decoration: none; letter-spacing: -0.5px; }
  .email-body { padding: 32px 40px; }
  .email-h1 { font-family: 'Golos Text', Arial, sans-serif; font-weight: 900; font-size: 24px; color: #111111; margin: 0 0 16px; line-height: 1.3; }
  .email-text { font-family: 'Golos Text', Arial, sans-serif; font-weight: 400; font-size: 15px; color: #111111; line-height: 1.6; margin: 0 0 24px; }
  .email-btn { display: inline-block; background-color: #0000FF; color: #FFFFFF !important; font-family: 'Golos Text', Arial, sans-serif; font-weight: 700; font-size: 15px; text-decoration: none; padding: 14px 28px; border-radius: 8px; margin-bottom: 24px; }
  .email-footer { padding: 20px 40px 28px; border-top: 1px solid #F0F0F0; }
  .email-footer-text { font-family: 'Golos Text', Arial, sans-serif; font-weight: 400; font-size: 12px; color: #999999; margin: 0; line-height: 1.6; }
  .email-footer-text a { color: #999999; text-decoration: underline; }
</style>
</head>
<body>
<div class="email-wrapper">
  <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F6F6F6;padding:32px 16px;">
    <tr>
      <td align="center">
        <table cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;background-color:#FFFFFF;border-radius:12px;overflow:hidden;">
          <!-- HEADER -->
          <tr>
            <td class="email-header" style="padding:28px 40px 20px;border-bottom:1px solid #F0F0F0;">
              <a href="https://app.unilist.ru" class="email-logo" style="font-family:'Golos Text',Arial,sans-serif;font-weight:900;font-size:20px;color:#111111;text-decoration:none;letter-spacing:-0.5px;">Unilist</a>
            </td>
          </tr>
          <!-- BODY -->
          <tr>
            <td class="email-body" style="padding:32px 40px;">
              <h1 class="email-h1" style="font-family:'Golos Text',Arial,sans-serif;font-weight:900;font-size:24px;color:#111111;margin:0 0 16px;line-height:1.3;">Платёж не прошёл</h1>
              <p class="email-text" style="font-family:'Golos Text',Arial,sans-serif;font-weight:400;font-size:15px;color:#111111;line-height:1.6;margin:0 0 24px;">Мы попробовали списать {{amount}}₽, но что-то пошло не так. Доступ к аккаунту сохраняется ещё {{days_left}} дней — обновите способ оплаты, чтобы не прерывать работу.</p>
              <a href="{{payment_url}}" class="email-btn" style="display:inline-block;background-color:#0000FF;color:#FFFFFF;font-family:'Golos Text',Arial,sans-serif;font-weight:700;font-size:15px;text-decoration:none;padding:14px 28px;border-radius:8px;margin-bottom:24px;">Обновить способ оплаты</a>
            </td>
          </tr>
          <!-- FOOTER -->
          <tr>
            <td class="email-footer" style="padding:20px 40px 28px;border-top:1px solid #F0F0F0;">
              <p class="email-footer-text" style="font-family:'Golos Text',Arial,sans-serif;font-weight:400;font-size:12px;color:#999999;margin:0;line-height:1.6;">© 2026 Unilist &nbsp;·&nbsp; <a href="{{unsubscribe_url}}" style="color:#999999;text-decoration:underline;">Отписаться</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
